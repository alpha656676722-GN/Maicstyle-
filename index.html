<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maïc Vibes AI - Hyper Real</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #0b211a;
            background-image: radial-gradient(circle at top, #143d31 0%, #0b211a 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .gold { color: #d4af37; }
        header { padding: 10px 0; text-align: center; flex-shrink: 0; }
        h1 { font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        header p { font-size: 0.65rem; margin: 3px 0 0 0; opacity: 0.6; }
        
        main { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px 15px; max-width: 480px; margin: 0 auto; width: 100%; }
        
        /* ZONE PHOTO OPTIMISÉE */
        #preview-container {
            flex-grow: 1; max-height: 52vh; width: 100%; border: 2px solid #d4af37; border-radius: 20px;
            background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.5); margin-bottom: 8px;
            cursor: pointer;
        }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { text-align: center; color: #d4af37; padding: 15px; }

        /* SECTION CONTRÔLES */
        .controls {
            background: rgba(26, 60, 49, 0.95); padding: 12px; border-radius: 18px;
            border: 1px solid rgba(212, 175, 55, 0.3); flex-shrink: 0; margin-bottom: 5px;
        }
        .control-label { font-size: 0.7rem; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; text-align: center;}
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .style-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3);
            color: white; padding: 10px 2px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .style-btn.selected { background: #d4af37; color: #0b211a; font-weight: bold; border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

        #progress-container { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 10px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #b38728, #fcf6ba, #d4af37); transition: width 0.3s; }

        .main-btn {
            background: linear-gradient(135deg, #d4af37, #b38728); color: #0b211a;
            padding: 15px; border-radius: 25px; font-weight: 900; width: 100%; border: none;
            font-size: 0.95rem; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #downloadBtn { background: white; color: black; margin-top: 8px; display: none; padding: 12px; font-size: 0.85rem;}
        
        footer { padding: 5px; font-size: 0.6rem; opacity: 0.4; text-align: center; letter-spacing: 1px;}
    </style>
</head>
<body>

    <header>
        <h1>🌙 Maïc <span class="gold">Vibes</span></h1>
        <p>STUDIO DE MODE VIRTUEL • HYPER-RÉALISTE</p>
    </header>

    <main>
        <div id="preview-container" onclick="document.getElementById('imageInput').click()">
            <div id="placeholder-box" class="placeholder-text">
                <div style="font-size: 2.2rem;">📸</div>
                <p style="font-size:0.8rem; font-weight:bold; margin: 8px 0;">CLIQUE POUR AJOUTER TA PHOTO</p>
                <p style="font-size:0.65rem; opacity:0.7;">Portrait clair = Meilleur résultat</p>
            </div>
            <img id="preview" src="">
        </div>

        <input type="file" id="imageInput" accept="image/*" hidden>

        <div class="controls">
            <span class="control-label">1. Choisis ton style</span>
            <div class="grid">
                <button class="style-btn" onclick="selectStyle(this, 'wearing luxurious Moroccan Djellaba with intricate gold embroidery, ramadan fashion')">Djellaba</button>
                <button class="style-btn" onclick="selectStyle(this, 'wearing royal Moroccan Caftan, elegant silk fabric, traditional pattern')">Caftan</button>
                <button class="style-btn" onclick="selectStyle(this, 'wearing modern premium white Qamis, minimalist arabian style')">Qamis</button>
            </div>

            <div id="progress-container"><div id="progress-bar"></div></div>

            <span class="control-label">2. Lance la magie</span>
            <button id="generateBtn" class="main-btn">Révéler mon Look ✨</button>
            <button id="downloadBtn" class="main-btn">Télécharger mon Look 📥</button>
        </div>

        <footer>DESIGN BY MAÏC STYLE • ALL RIGHTS RESERVED</footer>
    </main>

    <script>
        // --- CONFIGURATION ---
        // Encode ton token sur base64encode.org et colle-le ici :
        const secret = "TON_TOKEN_BASE64_ICI"; 
        const AUTH = atob(secret);
        const MODEL = "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0";

        let chosenStyle = "";
        let userImageBase64 = "";

        const input = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder-box');
        const genBtn = document.getElementById('generateBtn');
        const downBtn = document.getElementById('downloadBtn');
        const progBar = document.getElementById('progress-bar');
        const progCont = document.getElementById('progress-container');

        function selectStyle(btn, prompt) {
            chosenStyle = prompt;
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // Gestion de l'image (Compression optimisée pour le réalisme)
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // On monte la taille à 1024 pour plus de détails sur le visage
                    const MAX_SIZE = 1024; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    userImageBase64 = canvas.toDataURL('image/jpeg', 0.9); // Qualité supérieure
                    preview.src = userImageBase64;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    downBtn.style.display = 'none';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function generateImage() {
            if (!userImageBase64) return alert("❌ Ajoute ta photo d'abord !");
            if (!chosenStyle) return alert("⚠️ Sélectionne Djellaba, Caftan ou Qamis !");

            genBtn.disabled = true;
            genBtn.innerText = "⏳ CRÉATION EN COURS...";
            progCont.style.display = 'block'; progBar.style.width = '10%';

            // Super Prompt Hyper-Réaliste
            const finalPrompt = `A photorealistic portrait of the same person from the input image, maintaining their exact facial features and expression, but they are now wearing a ${chosenStyle}. Hyper-detailed fabric texture, professional studio lighting, 8k, highly detailed skin, realistic eyes, masterpiece, sharp focus.`;
            
            // Negative Prompt Puissant pour protéger le visage
            const negativePrompt = "disfigured face, ugly, modified face, different person, distorted eyes, bad anatomy, blurry, low quality, cartoon, drawing, illustration, painting, deformed hands, extra fingers, text, watermark";

            try {
                let p = 15;
                const interval = setInterval(() => {
                    if (p < 90) { p += 3; progBar.style.width = p + '%'; }
                }, 1200);

                const response = await fetch(MODEL, {
                    headers: { "Authorization": `Bearer ${AUTH}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({
                        inputs: finalPrompt,
                        parameters: { 
                            "negative_prompt": negativePrompt,
                            "guidance_scale": 7.5, // Équilibre entre le prompt et la photo
                            "num_inference_steps": 30 // Plus de détails
                        }
                    }),
                });

                clearInterval(interval);

                if (response.status === 503) throw new Error("L'IA se réveille... Reclique dans 15 secondes !");
                if (!response.ok) throw new Error("Erreur (Vérifie ton Token)");

                const blob = await response.blob();
                const resultUrl = URL.createObjectURL(blob);
                
                progBar.style.width = '100%';
                preview.src = resultUrl;
                downBtn.style.display = 'block';
                
                downBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = resultUrl;
                    a.download = "Maic_Style_Real.png";
                    a.click();
                };

            } catch (err) {
                alert(err.message);
                progBar.style.width = '0%';
            } finally {
                genBtn.disabled = false;
                genBtn.innerText = "Révéler mon Look ✨";
                setTimeout(() => { progCont.style.display = 'none'; }, 1000);
            }
        }

        genBtn.onclick = generateImage;
    </script>
</body>
    </html>
